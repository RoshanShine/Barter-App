<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SwapHub - Barter & Trade</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#">SwapHub</a>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
      <h2 class="mb-4">Latest Products</h2>
      
      <div class="row">
        {% for product in products %}
        <div class="col-md-4 mb-4">
          <div class="card h-100 shadow-sm">
            <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}" style="height: 200px; object-fit: cover;">
            <div class="card-body">
              <h5 class="card-title">{{ product.name }}</h5>
              <p class="card-text text-muted"><small>📍 {{ product.location }}</small></p>
              <p class="card-text">
                <span class="badge bg-success">{{ product.get_exchange_type_display }}</span>
                {% if product.price %}
                <span class="badge bg-secondary">${{ product.price }}</span>
                {% endif %}
              </p>
              <p class="card-text">Owner: {{ product.user.username }}</p>
            </div>
            <div class="card-footer bg-white border-top-0">
                <a href="#" class="btn btn-outline-primary w-100">View Details</a>
            </div>
          </div>
        </div>
        {% endfor %}
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
