{% extends "base.html" %}

{% block title %}Rate {{ rated_user.username }} | SwapHub{% endblock %}

{% block content %}
<div class="animate-fade-in py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="glass-card p-5">
                <h3 class="fw-bold mb-4">Rate your Experience</h3>
                <p class="text-muted mb-5">How was your interaction with <strong>@{{ rated_user.username }}</strong>?</p>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-5 text-center">
                        <label class="form-label text-white fw-semibold small text-uppercase d-block mb-3">Overall Score</label>
                        <div class="star-rating d-flex justify-content-center gap-3">
                            {% for i in "54321" %}
                                <input type="radio" id="star{{ i }}" name="score" value="{{ i }}" required class="d-none">
                                <label for="star{{ i }}" class="fs-1 cursor-pointer star-label">
                                    <i class="fas fa-star"></i>
                                </label>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-white fw-semibold small text-uppercase">Optional Comment</label>
                        <textarea name="comment" class="form-control glass-card text-white border-0 p-4" rows="4" placeholder="Share more details about the trade..."></textarea>
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn-premium px-4 fs-5">Submit Rating</button>
                        <a href="{% url 'profile_view' rated_user.username %}" class="btn btn-link text-muted text-decoration-none text-center">Back to Profile</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .star-label { color: rgba(255,255,255,0.1); transition: all 0.2s ease; }
    .star-rating input:checked ~ .star-label { color: #ffc107; }
    .star-label:hover, .star-label:hover ~ .star-label { color: #ffc107 !important; }
    
    .star-rating { flex-direction: row-reverse; }
</style>
{% endblock %}
