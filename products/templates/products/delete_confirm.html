{% extends "base.html" %}

{% block title %}Delete Listing | SwapHub{% endblock %}

{% block content %}
<div class="animate-fade-in py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="glass-card p-5 text-center">
                <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex p-4 mb-4">
                    <i class="fas fa-trash-alt text-danger fs-1"></i>
                </div>
                
                <h2 class="fw-bold mb-3">Delete Listing?</h2>
                <p class="text-muted mb-5">Are you sure you want to delete <span class="text-white fw-bold">"{{ product.name }}"</span>? This action cannot be undone.</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-danger rounded-pill py-3 fw-bold">
                            Yes, Delete Permanently
                        </button>
                        <a href="{% url 'product_detail' product.pk %}" class="btn glass-card border-0 py-3 text-white-50">
                            Cancel and Go Back
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
